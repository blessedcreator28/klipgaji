name: Build and Push Docker Image

on:
  push:
    branches: [ main, stable ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (latest)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable')
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          no-cache: true  # INI KUNCI UTAMA: Hancurkan semua cache, paksa build dari 0
          tags: blessedcreator/klipgaji-worker:latest

      - name: Build and push (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          no-cache: true  # INI KUNCI UTAMA: Hancurkan semua cache, paksa build dari 0
          tags: blessedcreator/klipgaji-worker:${{ github.ref_name }}
