name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          # Menggunakan logika eksplisit:
          # Jika push ke main, tag = latest
          # Jika push tag, tag = nama tag (v21)
          tags: |
            blessedcreator/klipgaji-worker:latest
            ${{ github.ref_type == 'tag' && format('blessedcreator/klipgaji-worker:{0}', github.ref_name) || '' }}
